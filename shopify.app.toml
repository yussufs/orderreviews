# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "67a6df181b123ee57dcbe70d7e840b54"
name = "Order Reviews & Google Ratings"
handle = "order-reviews-google-ratings"
application_url = "https://orderreviews.dragonapps.io"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = [ "orders/fulfilled" ]
  uri = "/webhooks/orders/fulfilled"

  # Billing API plan sync. No billing scope is required — the app creates the
  # subscription via appSubscriptionCreate; this keeps shopPreferences.plan current.
  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app-subscriptions"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_orders"
use_legacy_install_flow = false

[app_proxy]
# Storefront fetches https://{shop}/apps/order-reviews/widget-settings, proxied to /proxy/*
# `shopify app dev` rewrites the URL's HOST to the dev tunnel but keeps the PATH,
# so the path here must be exactly /proxy (-> our route /proxy/widget-settings).
url = "https://orderreviews.dragonapps.io/proxy"
subpath = "order-reviews"
prefix = "apps"

[auth]
redirect_urls = [ "https://orderreviews.dragonapps.io/api/auth" ]
