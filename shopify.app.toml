# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "67a6df181b123ee57dcbe70d7e840b54"
name = "Order Reviews & Google Ratings"
handle = "order-reviews"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = [ "orders/fulfilled" ]
  uri = "/webhooks/orders/fulfilled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_orders"
use_legacy_install_flow = false

[app_proxy]
# Storefront fetches https://{shop}/apps/order-reviews/widget-settings, proxied to /proxy/*
# `shopify app dev` rewrites `url` to the dev tunnel automatically.
url = "https://shopify.dev/apps/default-app-home/proxy"
subpath = "order-reviews"
prefix = "apps"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]
